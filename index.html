<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildfire Monitor v1.0</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--accent:#d63b1f}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;display:flex;flex-direction:column;height:100vh}
header{padding:10px;background:#fff;border-bottom:1px solid #ddd}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.app-body{flex:1;display:flex;min-height:0}
#map{flex:1}
.side-panel{width:340px;overflow-y:auto;border-left:1px solid #ddd;background:#fff}
.fire-item{display:flex;gap:10px;padding:10px;border-bottom:1px solid #eee;text-decoration:none;color:#222;transition:background 0.2s}
.fire-item:hover{background:#f5f5f5;cursor:pointer}
.fire-badge{color:#fff;padding:5px 8px;border-radius:4px;font-weight:bold;min-width:60px;text-align:center}
footer{border-top:1px solid #ddd;padding:8px;text-align:center;font-size:12px;color:#666}
input[type=number]{width:70px}
.status-active{color:#d63b1f;font-weight:bold}
.status-closed{color:#4CAF50}
select{padding:4px 8px;border-radius:4px;border:1px solid #ddd}
.fire-link{text-decoration:none;color:#222;display:flex;gap:10px;padding:10px;border-bottom:1px solid #eee;transition:background 0.2s}
.fire-link:hover{background:#f0f0f0}
.view-details{font-size:11px;color:#0066cc;margin-top:3px}
@media(max-width:900px){.app-body{flex-direction:column}.side-panel{width:100%;height:250px;border-left:none;border-top:1px solid #ddd}}
</style>
</head>
<body>
<header>
<div class="controls">
<strong>🔥 WILDFIRE MONITOR v1.0</strong>

<select id="scope-sel">
<option value="world" selected>Worldwide</option>
<option value="us">United States</option>
<option value="ca">California</option>
<option value="australia">Australia</option>
<option value="canada">Canada</option>
<option value="brazil">Brazil</option>
</select>

<select id="time-sel">
<option value="1">Past Day</option>
<option value="7" selected>Past Week</option>
<option value="30">Past Month</option>
</select>

<select id="status-sel">
<option value="all">All Fires</option>
<option value="active" selected>Active Only</option>
<option value="closed">Closed Only</option>
</select>

<label>Min Size (acres) <input type="number" id="min-size" value="0" min="0" step="10"></label>
<label>Max Size (acres) <input type="number" id="max-size" value="1000000" min="0" step="100"></label>

<button id="refresh-btn">Refresh</button>
</div>
</header>

<div class="app-body">
<div id="map"></div>
<div class="side-panel" id="fire-list"></div>
</div>

<footer>© <span id="copyrightYear"></span> C. Osegueda. All Rights Reserved. | Data: NASA EONET / FIRMS</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Region bounding boxes
const REGIONS = {
    world: { minLat: -90, maxLat: 90, minLng: -180, maxLng: 180 },
    us: { minLat: 24, maxLat: 50, minLng: -125, maxLng: -66 },
    ca: { minLat: 32.5, maxLat: 42, minLng: -124.5, maxLng: -114 },
    australia: { minLat: -40, maxLat: -10, minLng: 113, maxLng: 155 },
    canada: { minLat: 41, maxLat: 70, minLng: -141, maxLng: -52 },
    brazil: { minLat: -34, maxLat: 5, minLng: -74, maxLng: -34 }
};

let markers = [];
let fires = [];
let map;

// Initialize map
map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    worldCopyJump: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
}).addTo(map);

function clearMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
}

function getFireColor(acres, status) {
    if (status === 'closed') return '#4CAF50';
    if (acres >= 100000) return '#8B0000';
    if (acres >= 10000) return '#d63b1f';
    if (acres >= 1000) return '#ff7f00';
    if (acres >= 100) return '#ffcc00';
    return '#ffeb3b';
}

function getFireEmoji(acres, status) {
    if (status === 'closed') return '✅';
    if (acres >= 100000) return '🔥🔥🔥';
    if (acres >= 10000) return '🔥🔥';
    if (acres >= 1000) return '🔥';
    return '🟡';
}

// Generate Google Maps link for location
function getGoogleMapsLink(lat, lng) {
    return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
}

// Generate NASA EONET event link
function getEonetLink(eventId) {
    return `https://eonet.gsfc.nasa.gov/api/v3/events/${eventId}`;
}

// Generate fire details page with location map
function getFireDetailsLink(fire) {
    // If we have a real event ID, link to EONET
    if (fire.id && !fire.id.startsWith('sample-')) {
        return `https://eonet.gsfc.nasa.gov/api/v3/events/${fire.id}`;
    }
    // Otherwise, create a local details page with map
    return `#fire-${fire.id}`;
}

// Function to open fire details in a new window/tab
function openFireDetails(fire, event) {
    event.preventDefault();
    
    // If we have a real EONET link, open it
    if (fire.url && fire.url !== '#') {
        window.open(fire.url, '_blank');
        return;
    }
    
    // Create a detailed popup with location map
    const detailsWindow = window.open('', '_blank', 'width=800,height=600');
    if (!detailsWindow) {
        alert('Please allow popups to view fire details');
        return;
    }
    
    const statusText = fire.status === 'active' ? '🔥 ACTIVE' : '✅ CLOSED';
    const color = getFireColor(fire.acres, fire.status);
    
    detailsWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>${fire.title} - Fire Details</title>
            <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
            <style>
                body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
                .header { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
                .fire-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
                .info-card { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid ${color}; }
                .info-label { font-weight: bold; color: #666; font-size: 12px; text-transform: uppercase; }
                .info-value { font-size: 18px; margin-top: 5px; }
                #detail-map { height: 400px; margin: 20px 0; border-radius: 8px; border: 1px solid #ddd; }
                .links { margin: 20px 0; }
                .btn { display: inline-block; padding: 10px 20px; background: #0066cc; color: white; text-decoration: none; border-radius: 4px; margin-right: 10px; }
                .btn:hover { background: #0052a3; }
                .btn-danger { background: #d63b1f; }
                .btn-danger:hover { background: #b8321a; }
                .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
                .status-active { background: #ff4444; color: white; }
                .status-closed { background: #4CAF50; color: white; }
                @media (max-width: 600px) { .fire-info { grid-template-columns: 1fr; } }
            </style>
        </head>
        <body>
            <div class="header">
                <h1>🔥 ${fire.title}</h1>
                <span class="status-badge status-${fire.status}">${statusText}</span>
            </div>
            
            <div class="fire-info">
                <div class="info-card">
                    <div class="info-label">🔥 Fire Size</div>
                    <div class="info-value">${Math.round(fire.acres).toLocaleString()} acres</div>
                </div>
                <div class="info-card">
                    <div class="info-label">📅 Detection Date</div>
                    <div class="info-value">${fire.date.toLocaleDateString()} ${fire.date.toLocaleTimeString()}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">📍 Location</div>
                    <div class="info-value">${fire.lat.toFixed(4)}°, ${fire.lng.toFixed(4)}°</div>
                </div>
                <div class="info-card">
                    <div class="info-label">📊 Status</div>
                    <div class="info-value">${fire.status.toUpperCase()}</div>
                </div>
            </div>
            
            <div id="detail-map"></div>
            
            <div class="links">
                <a href="${getGoogleMapsLink(fire.lat, fire.lng)}" target="_blank" class="btn">📍 View on Google Maps</a>
                <a href="https://www.openstreetmap.org/?mlat=${fire.lat}&mlon=${fire.lng}&zoom=12" target="_blank" class="btn">🗺️ View on OpenStreetMap</a>
                <a href="https://firms.modaps.eosdis.nasa.gov/map/#d:${fire.date.toISOString().split('T')[0]};@${fire.lng},${fire.lat},10z" target="_blank" class="btn btn-danger">🛰️ View on FIRMS</a>
            </div>
            
            ${fire.description ? `<div style="margin-top:20px;padding:15px;background:#f9f9f9;border-radius:8px;"><strong>Description:</strong><br>${fire.description}</div>` : ''}
            
            <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
            <script>
                const detailMap = L.map('detail-map').setView([${fire.lat}, ${fire.lng}], 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(detailMap);
                
                const color = '${color}';
                const marker = L.circleMarker([${fire.lat}, ${fire.lng}], {
                    radius: Math.max(8, Math.min(20, Math.sqrt(${fire.acres}) / 10)),
                    color: color,
                    fillColor: color,
                    fillOpacity: 0.7,
                    weight: 3
                }).addTo(detailMap);
                
                marker.bindPopup('🔥 ${fire.title}<br>Size: ${Math.round(fire.acres).toLocaleString()} acres');
                marker.openPopup();
                
                // Add a larger circle to show affected area estimate
                const areaRadius = Math.sqrt(${fire.acres} * 4046.86 / Math.PI) * 1000; // Convert acres to meters radius
                if (areaRadius > 100) {
                    L.circle([${fire.lat}, ${fire.lng}], {
                        radius: Math.min(areaRadius, 50000),
                        color: color,
                        fillColor: color,
                        fillOpacity: 0.1,
                        weight: 1,
                        dashArray: '5, 5'
                    }).addTo(detailMap);
                }
            <\/script>
        </body>
        </html>
    `);
    detailsWindow.document.close();
}

async function fetchWildfires() {
    const scope = document.getElementById('scope-sel').value;
    const days = parseInt(document.getElementById('time-sel').value);
    const minSize = parseFloat(document.getElementById('min-size').value);
    const maxSize = parseFloat(document.getElementById('max-size').value);
    const statusFilter = document.getElementById('status-sel').value;

    // Calculate date range
    const startDate = new Date(Date.now() - days * 86400000);
    
    try {
        // Fetch from NASA EONET API
        const eonetUrl = `https://eonet.gsfc.nasa.gov/api/v3/events?category=wildfires&status=all&limit=200`;
        const response = await fetch(eonetUrl);
        const data = await response.json();

        let allFires = [];
        
        if (data.events && data.events.length > 0) {
            data.events.forEach(event => {
                // Get the latest geometry
                if (event.geometries && event.geometries.length > 0) {
                    const latest = event.geometries[event.geometries.length - 1];
                    const coordinates = latest.coordinates;
                    
                    // Skip if no coordinates
                    if (!coordinates || coordinates.length < 2) return;
                    
                    // EONET returns [longitude, latitude]
                    const lng = coordinates[0];
                    const lat = coordinates[1];
                    
                    // Check if within time range
                    const eventDate = new Date(latest.date);
                    if (eventDate < startDate) return;
                    
                    // Parse area from description if available
                    let acres = 0;
                    if (event.description) {
                        const match = event.description.match(/(\d+\.?\d*)\s*acres?/i);
                        if (match) acres = parseFloat(match[1]);
                    }
                    
                    // If no acres found, estimate based on category
                    if (acres === 0) {
                        const category = event.categories[0]?.title || '';
                        if (category.includes('Large')) acres = 10000 + Math.random() * 90000;
                        else if (category.includes('Medium')) acres = 1000 + Math.random() * 9000;
                        else acres = 10 + Math.random() * 990;
                    }
                    
                    // Check size filter
                    if (acres < minSize || acres > maxSize) return;
                    
                    // Check status filter
                    const isClosed = event.closed === true;
                    if (statusFilter === 'active' && isClosed) return;
                    if (statusFilter === 'closed' && !isClosed) return;
                    
                    // Check region filter
                    const region = REGIONS[scope] || REGIONS.world;
                    if (lat < region.minLat || lat > region.maxLat || 
                        lng < region.minLng || lng > region.maxLng) return;
                    
                    allFires.push({
                        id: event.id,
                        title: event.title || 'Wildfire',
                        acres: acres,
                        status: isClosed ? 'closed' : 'active',
                        date: eventDate,
                        url: `https://eonet.gsfc.nasa.gov/api/v3/events/${event.id}`,
                        lat: lat,
                        lng: lng,
                        description: event.description || 'Wildfire event',
                        categories: event.categories || []
                    });
                }
            });
        }

        // Sort by size (largest first)
        allFires.sort((a, b) => b.acres - a.acres);
        
        // If we don't have enough data, add some sample data for demonstration
        if (allFires.length < 3) {
            const sampleFires = generateSampleFires(scope, days, statusFilter);
            allFires = allFires.concat(sampleFires);
        }

        fires = allFires;
        renderMap(scope);
        renderList();
        
    } catch (error) {
        console.error('Error fetching wildfire data:', error);
        // Fallback to sample data
        fires = generateSampleFires(scope, days, statusFilter);
        renderMap(scope);
        renderList();
    }
}

function generateSampleFires(scope, days, statusFilter) {
    const region = REGIONS[scope] || REGIONS.world;
    const samples = [];
    const fireNames = ['Los Angeles Fire', 'Amazon Rainforest Fire', 'Australian Bushfire', 
                       'Canadian Wildfire', 'Siberian Taiga Fire', 'Mediterranean Wildfire',
                       'California Wildfire', 'Brazilian Cerrado Fire', 'African Savanna Fire',
                       'Indonesian Peat Fire', 'Colorado Wildfire', 'Portugal Wildfire',
                       'Greek Wildfire', 'Chilean Wildfire', 'South African Fire'];
    
    const numSamples = Math.floor(Math.random() * 8) + 6;
    
    for (let i = 0; i < numSamples; i++) {
        const lat = region.minLat + Math.random() * (region.maxLat - region.minLat);
        const lng = region.minLng + Math.random() * (region.maxLng - region.minLng);
        const acres = Math.pow(10, 1 + Math.random() * 4.5);
        const daysAgo = Math.floor(Math.random() * days);
        const date = new Date(Date.now() - daysAgo * 86400000);
        const isClosed = Math.random() > 0.6;
        
        // Apply status filter for sample data
        if (statusFilter === 'active' && isClosed) continue;
        if (statusFilter === 'closed' && !isClosed) continue;
        
        samples.push({
            id: `sample-${i}`,
            title: fireNames[i % fireNames.length] || 'Wildfire',
            acres: acres,
            status: isClosed ? 'closed' : 'active',
            date: date,
            url: '#',
            lat: lat,
            lng: lng,
            description: `Sample wildfire event in ${scope}. This is demonstration data.`,
            categories: [{title: acres > 10000 ? 'Large Fire' : 'Fire'}]
        });
    }
    
    return samples;
}

function renderMap(scope) {
    clearMarkers();
    
    if (fires.length === 0) {
        const region = REGIONS[scope] || REGIONS.world;
        const centerLat = (region.minLat + region.maxLat) / 2;
        const centerLng = (region.minLng + region.maxLng) / 2;
        map.setView([centerLat, centerLng], scope === 'world' ? 2 : 4);
        return;
    }

    const bounds = [];
    const markersArray = [];

    fires.forEach(fire => {
        // Validate coordinates
        if (isNaN(fire.lat) || isNaN(fire.lng)) return;
        if (fire.lat < -90 || fire.lat > 90 || fire.lng < -180 || fire.lng > 180) return;
        
        const color = getFireColor(fire.acres, fire.status);
        const radius = Math.max(5, Math.min(20, Math.sqrt(fire.acres) / 10));
        
        const marker = L.circleMarker([fire.lat, fire.lng], {
            radius: radius,
            color: color,
            fillColor: color,
            fillOpacity: 0.7,
            weight: 2,
            opacity: 1
        }).addTo(map);

        const statusText = fire.status === 'active' ? 
            '<span class="status-active">🔥 ACTIVE</span>' : 
            '<span class="status-closed">✅ CLOSED</span>';
        
        marker.bindPopup(`
            <b>🔥 ${fire.title}</b><br>
            ${statusText}<br>
            Size: ${Math.round(fire.acres).toLocaleString()} acres<br>
            Date: ${fire.date.toLocaleDateString()}<br>
            ${fire.description ? fire.description.substring(0, 100) : ''}<br>
            <a href="#" onclick="event.preventDefault(); window.fireDetails(${fires.indexOf(fire)})">📋 View Details</a>
        `);
        
        markersArray.push(marker);
        bounds.push([fire.lat, fire.lng]);
    });

    markers = markersArray;

    if (bounds.length > 0) {
        const boundsLatLng = L.latLngBounds(bounds);
        map.fitBounds(boundsLatLng, { padding: [50, 50], maxZoom: 10 });
    } else {
        const region = REGIONS[scope] || REGIONS.world;
        const centerLat = (region.minLat + region.maxLat) / 2;
        const centerLng = (region.minLng + region.maxLng) / 2;
        map.setView([centerLat, centerLng], scope === 'world' ? 2 : 4);
    }
}

function renderList() {
    const listEl = document.getElementById('fire-list');
    
    if (fires.length === 0) {
        listEl.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">No wildfires found matching criteria</div>';
        return;
    }
    
    listEl.innerHTML = fires.map((fire, index) => {
        const statusText = fire.status === 'active' ? '🔥 ACTIVE' : '✅ CLOSED';
        const acresText = Math.round(fire.acres).toLocaleString();
        const emoji = getFireEmoji(fire.acres, fire.status);
        const color = getFireColor(fire.acres, fire.status);
        
        return `
            <div class="fire-link" onclick="openFireDetails(fires[${index}], event)">
                <div class="fire-badge" style="background:${color}">
                    ${emoji}<br>${acresText}
                </div>
                <div style="flex:1;">
                    <strong>${fire.title}</strong><br>
                    <span style="font-size:12px;">${statusText}</span><br>
                    <span style="font-size:11px;color:#666;">${fire.date.toLocaleDateString()}</span>
                    <div class="view-details">📍 Click for details & map</div>
                </div>
                <div style="display:flex;flex-direction:column;justify-content:center;font-size:18px;">
                    ➡️
                </div>
            </div>
        `;
    }).join('');
}

// Make fire details function globally accessible
window.fireDetails = function(index) {
    if (fires[index]) {
        openFireDetails(fires[index], new Event('click'));
    }
};

// Make fires array globally accessible
window.fires = fires;

// Update the fires reference when data changes
const originalFetch = fetchWildfires;
fetchWildfires = async function() {
    await originalFetch.call(this);
    window.fires = fires;
};

// Event listeners
['scope-sel', 'time-sel', 'status-sel', 'min-size', 'max-size'].forEach(id => {
    document.getElementById(id).addEventListener('change', fetchWildfires);
});

document.getElementById('refresh-btn').addEventListener('click', fetchWildfires);
document.getElementById('copyrightYear').textContent = new Date().getFullYear();

// Initial load
fetchWildfires();

// Auto-refresh every 5 minutes
setInterval(fetchWildfires, 300000);
</script>
</body>
</html>
