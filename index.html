<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildfire Monitor — FIRMS 24h</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial, sans-serif; display:flex; flex-direction:column; height:100vh; }
header { padding:10px; background:#fff; border-bottom:1px solid #ddd; }
.controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
#map { flex:1; }
.app-body { flex:1; display:flex; min-height:0; }
.side-panel { width:330px; overflow-y:auto; border-left:1px solid #ddd; background:#fff; }
.fire-item { padding:10px; border-bottom:1px solid #eee; cursor:pointer; display:flex; gap:10px; }
.fire-item:hover { background:#f5f5f5; }
.fire-badge { padding:6px 8px; border-radius:4px; color:#fff; font-weight:bold; min-width:60px; text-align:center; }
footer { padding:8px; border-top:1px solid #ddd; text-align:center; font-size:12px; color:#666; }
</style>
</head>

<body>

<header>
<div class="controls">
<strong>🔥 Wildfire Monitor — FIRMS 24h</strong>

<select id="region">
<option value="world" selected>Worldwide</option>
<option value="us">United States</option>
<option value="ca">California</option>
<option value="canada">Canada</option>
<option value="australia">Australia</option>
<option value="brazil">Brazil</option>
</select>

<button id="refresh">Refresh</button>
</div>
</header>

<div class="app-body">
<div id="map"></div>
<div class="side-panel" id="fire-list"></div>
</div>

<footer>
© <span id="year"></span> C. Osegueda — Data: NASA FIRMS (24h)
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Stable NASA FIRMS 24h CSV feed
const FIRMS_URL =
 "https://firms.modaps.eosdis.nasa.gov/data/active_fire/viirs/viirs_snpp_nrt_global_24h.csv";

// Region bounding boxes
const REGIONS = {
    world:{minLat:-90,maxLat:90,minLng:-180,maxLng:180},
    us:{minLat:24,maxLat:50,minLng:-125,maxLng:-66},
    ca:{minLat:32.5,maxLat:42,minLng:-124.5,maxLng:-114},
    canada:{minLat:41,maxLat:70,minLng:-141,maxLng:-52},
    australia:{minLat:-40,maxLat:-10,minLng:113,maxLng:155},
    brazil:{minLat:-34,maxLat:5,minLng:-74,maxLng:-34}
};

let fires = [];
let markers = [];

const map = L.map("map", { center:[20,0], zoom:2 });
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution:"© OpenStreetMap contributors"
}).addTo(map);

function clearMarkers(){
    markers.forEach(m => map.removeLayer(m));
    markers = [];
}

function getColor(bright){
    if(bright > 450) return "#8B0000";
    if(bright > 400) return "#d63b1f";
    if(bright > 350) return "#ff7f00";
    return "#ffcc00";
}

function getEmoji(bright){
    if(bright > 450) return "🔥🔥🔥";
    if(bright > 400) return "🔥🔥";
    if(bright > 350) return "🔥";
    return "🟡";
}

async function loadFires(){
    const region = document.getElementById("region").value;
    const bounds = REGIONS[region];

    try {
        const res = await fetch(FIRMS_URL);
        const text = await res.text();

        const rows = text.split("\n").slice(1);
        fires = [];

        rows.forEach(row => {
            const c = row.split(",");
            if(c.length < 10) return;

            const lat = parseFloat(c[0]);
            const lng = parseFloat(c[1]);
            const bright = parseFloat(c[2]);
            const date = c[5] + " " + c[6];

            if(lat < bounds.minLat || lat > bounds.maxLat) return;
            if(lng < bounds.minLng || lng > bounds.maxLng) return;

            fires.push({
                lat, lng, bright, date,
                url:`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`
            });
        });

        renderMap();
        renderList();

    } catch (e){
        alert("Error loading FIRMS data.");
        console.error(e);
    }
}

function renderMap(){
    clearMarkers();

    if(fires.length === 0){
        map.setView([20,0],2);
        return;
    }

    const bounds = [];

    fires.forEach(f => {
        const color = getColor(f.bright);
        const marker = L.circleMarker([f.lat, f.lng], {
            radius: Math.max(5, Math.min(20, f.bright/20)),
            color, fillColor:color, fillOpacity:0.7
        }).addTo(map);

        marker.bindPopup(`
            <b>🔥 Fire Detection</b><br>
            Brightness: ${f.bright}<br>
            Time: ${f.date}<br>
            <a href="${f.url}" target="_blank">📍 View on Google Maps</a>
        `);

        markers.push(marker);
        bounds.push([f.lat, f.lng]);
    });

    map.fitBounds(bounds, { padding:[40,40], maxZoom:10 });
}

function renderList(){
    const list = document.getElementById("fire-list");

    if(fires.length === 0){
        list.innerHTML = `<div style="padding:20px;text-align:center;color:#666;">No fires found</div>`;
        return;
    }

    list.innerHTML = fires.map(f => `
        <div class="fire-item" onclick="window.open('${f.url}','_blank')">
            <div class="fire-badge" style="background:${getColor(f.bright)}">
                ${getEmoji(f.bright)}<br>${Math.round(f.bright)}
            </div>
            <div>
                <strong>Active Fire</strong><br>
                <span style="font-size:12px;">${f.date}</span><br>
                <span style="font-size:11px;color:#0066cc;">📍 View location</span>
            </div>
        </div>
    `).join("");
}

document.getElementById("refresh").addEventListener("click", loadFires);
document.getElementById("year").textContent = new Date().getFullYear();

loadFires();
</script>

</body>
</html>
